<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak-Craft AI Assistant</title>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #chat-header {
            padding: 20px;
            background-color: #010409;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            background-image: radial-gradient(circle at center, #1a1f26 0%, #161b22 100%);
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 1rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background-color: #238636;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .err-message {
            background-color: #8b1e1e;
            color: #fff;
            align-self: center;
            font-size: 0.85rem;
            text-align: center;
        }

        #input-container {
            display: flex;
            padding: 20px;
            background-color: #010409;
            border-top: 1px solid #30363d;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            padding: 14px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background-color: #0d1117;
            color: #c9d1d9;
            outline: none;
            font-size: 1rem;
        }

        #send-btn {
            background-color: #1f6feb;
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #send-btn:hover { background-color: #388bfd; }

        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #8b949e; border-radius: 50%; animation: blink 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">
            <span>👨‍🔧</span> Pak-Craft AI Assistant
        </div>
        <div id="chat-box">
            <div class="message ai-message">Halo! Saya <b>Pak-Craft</b>. Sekarang sistem saya sudah diperbarui. Ada yang bisa saya bantu?</div>
        </div>
        <div id="input-container">
            <input type="text" id="user-input" placeholder="Tanyakan sesuatu ke Pak-Craft..." autocomplete="off">
            <button id="send-btn">KIRIM</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const API_KEY = "AIzaSyB3Q9zhwL1F1B8_NdgFQeqJ0qMfbxU6r6s"; 

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (sender === 'user') msgDiv.classList.add('user-message');
            else if (sender === 'ai') msgDiv.classList.add('ai-message');
            else msgDiv.classList.add('err-message');
            
            if (text === 'typing') {
                msgDiv.id = 'typing-indicator';
                msgDiv.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            } else {
                let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
                msgDiv.innerHTML = formattedText;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function getAIResponse(prompt) {
            addMessage(prompt, 'user');
            userInput.value = '';
            addMessage('typing', 'ai');

            try {
                // MENGGUNAKAN VERSI v1 UNTUK STABILITAS
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const indicator = document.getElementById('typing-indicator');
                if(indicator) indicator.remove();

                if (data.error) {
                    addMessage(`ERROR: ${data.error.message}`, 'error');
                } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    addMessage("Pak-Craft tidak menerima respon. Coba lagi.", "ai");
                }
            } catch (error) {
                const indicator = document.getElementById('typing-indicator');
                if(indicator) indicator.remove();
                addMessage("Terjadi masalah koneksi. Pastikan internetmu aktif.", "error");
            }
        }

        sendBtn.addEventListener('click', () => {
            if (userInput.value.trim()) getAIResponse(userInput.value.trim());
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && userInput.value.trim()) getAIResponse(userInput.value.trim());
        });
    </script>
</body>
</html>
