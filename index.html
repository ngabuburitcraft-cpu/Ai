<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak-Craft AI | Freedom Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #fbbf24; 
            --bg: #09090b;
            --surface: #18181b;
            --text: #f4f4f5;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #27272a, #09090b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            padding: 10px;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 94vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
        }

        header {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .info h1 { font-size: 1.1rem; font-weight: 800; }
        .info span { font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px; }

        #chat-flow {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .ai { background: #27272a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; border-bottom-right-radius: 4px; }
        .error-log { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); width: 100%; text-align: center; border-radius: 12px; padding: 10px; font-size: 0.8rem; }

        .input-bar {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .input-wrap {
            flex: 1;
            background: #09090b;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0 15px;
            display: flex;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 1rem;
        }

        button {
            width: 50px; height: 50px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button svg { width: 22px; height: 22px; stroke: #000; }

        /* Typing Dots */
        .dots { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #71717a; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(-5px); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="icon">👨‍🔧</div>
        <div class="info">
            <h1>Pak-Craft AI</h1>
            <span>Unlimited Free Edition</span>
        </div>
    </header>

    <div id="chat-flow">
        <div class="bubble ai">
            Halo! Saya **Pak-Craft**. Sistem saya sekarang jauh lebih stabil dan gratis selamanya. <br>
            Ada yang bisa saya bantu atau jelaskan hari ini?
        </div>
    </div>

    <div class="input-bar">
        <div class="input-wrap">
            <input type="text" id="user-input" placeholder="Tanyakan apa saja..." autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const chatFlow = document.getElementById('chat-flow');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    // MENGGUNAKAN HUGGING FACE API (GRATIS)
    // Kamu bisa buat token gratis di huggingface.co jika token ini limit
    const API_TOKEN = "hf_vRjNfXzNlZzXyXzXzXzXzXzXzXzXzXzXzX"; // Contoh format
    
    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        if (type === 'loading') {
            d.id = 'active-loader';
            d.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        } else {
            d.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }
        chatFlow.appendChild(d);
        chatFlow.scrollTop = chatFlow.scrollHeight;
    }

    async function askAI() {
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';
        addMsg('', 'loading');

        try {
            // Kita pakai model Mistral-7B yang sangat pintar dan gratis
            const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    // "Authorization": `Bearer ${API_TOKEN}` // Opsional untuk Hugging Face free tier
                },
                body: JSON.stringify({ inputs: `<s>[INST] Jawab dalam Bahasa Indonesia yang ramah sebagai Pak-Craft AI: ${text} [/INST]` })
            });

            const data = await response.json();
            const loader = document.getElementById('active-loader');
            if (loader) loader.remove();

            if (data[0] && data[0].generated_text) {
                // Membersihkan teks dari instruksi
                let aiRes = data[0].generated_text.split('[/INST]')[1] || data[0].generated_text;
                addMsg(aiRes.trim(), 'ai');
            } else {
                addMsg("Aduh, Pak-Craft lagi istirahat sebentar. Coba tanya lagi ya!", "ai");
            }
        } catch (e) {
            const loader = document.getElementById('active-loader');
            if (loader) loader.remove();
            addMsg("❌ Terjadi gangguan koneksi. Coba lagi nanti.", "error-log");
        }
    }

    btn.onclick = askAI;
    input.onkeypress = (e) => { if (e.key === 'Enter') askAI(); };
</script>

</body>
</html>
