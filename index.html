<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak-Craft AI | Supreme Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text); padding: 15px; overflow: hidden;
        }

        #app-container {
            width: 100%; max-width: 850px; height: 92vh;
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            padding: 25px 35px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 20px;
            background: rgba(255,255,255,0.02);
        }

        .ai-avatar {
            width: 50px; height: 50px; border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        #chat-area {
            flex: 1; padding: 30px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 25px;
        }

        .msg {
            max-width: 80%; padding: 16px 22px; border-radius: 22px;
            line-height: 1.6; font-size: 1rem; animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-msg { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        .user-msg { background: linear-gradient(135deg, var(--primary), var(--secondary)); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
        .system-msg { align-self: center; font-size: 0.8rem; background: rgba(239, 68, 68, 0.1); color: #f87171; padding: 8px 20px; border-radius: 100px; border: 1px solid rgba(239, 68, 68, 0.2); }

        .input-box {
            padding: 30px; background: rgba(0,0,0,0.2);
            display: flex; gap: 15px; align-items: center;
        }

        .field {
            flex: 1; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px; padding: 4px 6px; display: flex; transition: 0.3s;
        }

        .field:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }

        input {
            width: 100%; background: transparent; border: none;
            padding: 12px 20px; color: #fff; outline: none; font-size: 1rem;
        }

        .send-btn {
            width: 54px; height: 54px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .send-btn:hover { transform: scale(1.1) rotate(-5deg); filter: brightness(1.2); }

        /* Loading */
        .typing { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 7px; height: 7px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="ai-avatar">👨‍🔧</div>
        <div style="flex:1">
            <h2 style="font-size: 1.2rem; font-weight: 800;">Pak-Craft Supreme</h2>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8;">
                <div class="status-dot"></div> Multi-Engine Active
            </div>
        </div>
    </header>

    <div id="chat-area">
        <div class="msg ai-msg">
            Halo Boss! Saya **Pak-Craft**. Kali ini saya sudah dipersenjatai dengan sistem **Supreme Multi-Engine**. Jika satu jalur macet, saya otomatis pindah jalur. <br>
            Ada yang bisa saya bantu?
        </div>
    </div>

    <div class="input-box">
        <div class="field">
            <input type="text" id="user-input" placeholder="Tuliskan sesuatu..." autocomplete="off">
        </div>
        <button class="send-btn" id="send-trigger">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-trigger');

    // MENGGUNAKAN DUA ENGINE (HuggingFace + DuckDuckGo AI Proxy jika tersedia)
    async function getAIResponse(prompt) {
        // ENGINE 1: Hugging Face (Mistral v3) - Lebih Cerdas
        try {
            const res = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `<s>[INST] Jawab dalam Bahasa Indonesia sebagai asisten ahli bernama Pak-Craft: ${prompt} [/INST]` })
            });
            const data = await res.json();
            if (data[0] && data[0].generated_text) {
                return data[0].generated_text.split('[/INST]')[1] || data[0].generated_text;
            }
        } catch (e) {
            console.log("Engine 1 Gagal, mencoba Engine 2...");
        }

        // ENGINE 2: Alternatif Hugging Face (Qwen) - Lebih Ringan
        try {
            const res = await fetch("https://api-inference.huggingface.co/models/Qwen/Qwen2.5-7B-Instruct", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: prompt })
            });
            const data = await res.json();
            return data[0].generated_text || "Maaf Boss, semua jalur lagi macet parah. Coba 5 detik lagi ya!";
        } catch (e) {
            return "Waduh, koneksi ke semua server Pak-Craft terputus. Coba cek internetmu!";
        }
    }

    function addBubble(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        if (type === 'loader') {
            d.id = 'current-loader';
            d.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        } else {
            d.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }
        chatArea.appendChild(d);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function handleChat() {
        const val = userInput.value.trim();
        if (!val) return;

        addBubble(val, 'user-msg');
        userInput.value = '';
        addBubble('', 'loader');

        const aiRes = await getAIResponse(val);
        const loader = document.getElementById('current-loader');
        if (loader) loader.remove();
        
        addBubble(aiRes, 'ai-msg');
    }

    sendBtn.onclick = handleChat;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };
</script>

</body>
</html>
