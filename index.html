<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak-Craft AI Assistant | Official</title>
    
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-chat: #161b22;
            --bg-header: #010409;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --text-main: #c9d1d9;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--bg-chat);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* HEADER */
        #chat-header {
            padding: 15px 20px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px; height: 10px; background: #238636; border-radius: 50%;
            box-shadow: 0 0 8px #238636;
        }

        #chat-header h2 { font-size: 1.1rem; color: var(--accent-blue); }

        /* AREA CHAT */
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at center, #1c2128 0%, #161b22 100%);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .ai { background: #21262d; border: 1px solid var(--border-color); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: var(--accent-green); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .error-msg { background: #442726; border: 1px solid #f85149; color: #ff7b72; align-self: center; font-size: 0.85rem; width: 90%; text-align: center; }

        /* INPUT */
        #input-area {
            padding: 15px;
            background: var(--bg-header);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--accent-blue); }

        button {
            padding: 0 20px;
            background: #1f6feb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #388bfd; }

        /* LOADING DOTS */
        .typing { display: flex; gap: 4px; padding: 5px; }
        .dot { width: 6px; height: 6px; background: #8b949e; border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <div class="status-dot"></div>
        <h2>👨‍🔧 Pak-Craft AI Assistant</h2>
    </div>
    
    <div id="chat-box">
        <div class="msg ai">Halo! Saya <b>Pak-Craft</b>. Saya sudah siap menjawab semua pertanyaanmu. Mau tanya apa hari ini?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesan..." autocomplete="off">
        <button id="send-btn">KIRIM</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // KONFIGURASI API
    const API_KEY = "AIzaSyB3Q9zhwL1F1B8_NdgFQeqJ0qMfbxU6r6s";
    // Menggunakan Endpoint v1beta karena v1 terkadang belum mendukung semua model flash di beberapa region
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        
        if (type === 'typing') {
            div.id = 'loading';
            div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        } else {
            // Format sederhana untuk bold dan baris baru
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function callAI() {
        const message = userInput.value.trim();
        if (!message) return;

        // Tampilkan pesan user
        appendMessage(message, 'user');
        userInput.value = '';

        // Tampilkan loading
        appendMessage('', 'typing');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: message }] }]
                })
            });

            const data = await response.json();
            
            // Hapus loading
            const loading = document.getElementById('loading');
            if (loading) loading.remove();

            if (data.error) {
                appendMessage(`🛑 <b>Error dari Google:</b> ${data.error.message}<br><small>Kode: ${data.error.code}</small>`, 'error-msg');
            } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage(aiResponse, 'ai');
            } else {
                appendMessage("Pak-Craft menerima respon kosong. Coba tanya lagi ya.", "ai");
            }

        } catch (err) {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            appendMessage("❌ <b>Gagal Terhubung:</b> Cek koneksi internet atau API Key kamu.", "error-msg");
            console.error(err);
        }
    }

    // Event Listener
    sendBtn.addEventListener('click', callAI);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') callAI();
    });
</script>

</body>
</html>
